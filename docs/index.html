<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="personal blog of ZGGGY">
    <title>zgggy</title>
    <link rel="icon" href="./assets/images/site/paidashuan.ico">
    <style>
      :root { --load-bg: #ffffff; --load-line: #e2e2e2; --load-text: #050505; --load-accent: #6b6b6b; }
      :root.dark-mode { --load-bg: #0a0a0a; --load-line: #333333; --load-text: #f0f0f0; --load-accent: #999999; }
      .loading-overlay {
        position: fixed; inset: 0; z-index: 9999;
        background: var(--load-bg);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        transition: opacity 0.5s ease-out;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .loading-overlay.is-hidden { opacity: 0; pointer-events: none; }
      .loading-bar {
        width: 200px; height: 3px;
        background: var(--load-line);
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-bar-track {
        height: 100%; width: 0%;
        background: var(--load-text);
        border-radius: 2px;
        transition: width 0.3s ease-out;
      }
      .loading-text {
        font-size: 0.8rem;
        color: var(--load-accent);
        letter-spacing: 0.05em;
      }
    </style>
    <script>
      (function() {
        var s = localStorage.getItem('theme');
        var d = s === 'dark' || (s !== 'light' && (
          window.matchMedia('(prefers-color-scheme: dark)').matches ||
          new Date().getHours() >= 20 || new Date().getHours() < 6
        ));
        if (d) document.documentElement.className = 'dark-mode';
      })();
    </script>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-page="home">
<div class="loading-overlay" id="loading-overlay"></div>
<script src="./assets/js/loading.js"></script>
<header class="site-header" id="site-header-root">
  <div class="header-inner">
    <div class="brandmark">
      <a class="brandmark-main" href="./">派大栓</a>
      <span class="brandmark-sub">WIRED NOTES / POEMS / ARCHIVE</span>
    </div>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题"></button>
  </div>
</header>
<main class="page-shell">
  <section class="hero-grid">
    <article class="hero-copy card-surface" data-home-slot="hero">
      <div class="hero-copy-meta"></div>
      <h1>ZGGGY</h1>
      <p class="hero-lead">hero</p>
    </article>
    <section class="feature-cluster card-surface">
      <div class="feature-link-block is-placeholder" data-home-slot="lovestory1">lovestory1</div>
      <div class="feature-link-block is-placeholder" data-home-slot="lovestory2">lovestory2</div>
      <div class="feature-link-block is-placeholder" data-home-slot="lovestory3">lovestory3</div>
    </section>
    <section class="algorithm-stack card-surface">
      <canvas class="algorithm-canvas algorithm-canvas-a" id="algorithm-canvas-a" width="400" height="210"></canvas>
      <canvas class="algorithm-canvas algorithm-canvas-b" id="algorithm-canvas-b" width="400" height="210"></canvas>
    </section>
  </section>

  <section class="midline-strip" data-home-slot="midline"><p>midline</p></section>

  <section class="directory-layout">
    <aside class="directory-sidebar card-surface">
      <div id="category-filters"></div>
    </aside>
    <section class="directory-main card-surface">
      <div class="article-directory" id="article-directory"></div>
    </section>
  </section>
  <div id="directory-scroll-spacer" aria-hidden="true"></div>
</main>
<footer class="site-footer" id="site-footer-root"><div class="footer-copy" data-home-slot="footer">- footer -</div></footer>
<div class="article-modal" id="article-modal" aria-hidden="true">
      <div class="article-modal-dialog">
        <div class="article-modal-header">
          <div class="article-modal-meta" id="article-modal-meta"></div>
          <button class="article-modal-close" id="article-modal-close" type="button" aria-label="close">×</button>
        </div>
        <div class="article-modal-scroll">
          <div class="article-modal-heading">
            <h2 class="article-modal-title" id="article-modal-title"></h2>
            <div class="article-modal-side">
              <div class="article-modal-time" id="article-modal-time"></div>
              <p class="article-modal-summary" id="article-modal-summary"></p>
            </div>
          </div>
          <div class="article-modal-body article-body" id="article-modal-body"></div>
        </div>
      </div>
    </div>
<script src="./assets/js/site.js"></script>
</body>
</html>
